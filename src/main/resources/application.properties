spring.application.name=simple-rest-jpa-game
server.port=9090

# File-backed H2 database. The database files are created under ./data/.
spring.datasource.url=jdbc:h2:file:./data/game-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Keep schema changes beginner-friendly for the lab.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Browser database console for teaching and debugging.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
